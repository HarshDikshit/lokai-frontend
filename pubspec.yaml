name: lokai
description: LokAI – Local Leadership Decision Intelligence Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3+1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^10.0.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  url_launcher: ^6.3.0
  flutter_map: ^6.1.0
  latlong2: 0.9.0
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  
  # Media
  image_picker: ^1.1.2
  file_picker: ^8.0.7
  flutter_sound: ^9.2.13
  speech_to_text: ^7.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  # For Android 8.0+, you can also set a background color/image
  adaptive_icon_background: "#FFFFFF" 
  adaptive_icon_foreground: "assets/logo.png"